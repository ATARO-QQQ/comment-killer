<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46; 
        }
    </style>
</head>
<body class="min-h-screen bg-[#09090b] text-gray-300 p-4 md:p-8 font-sans selection:bg-indigo-500/30">
    <div class="max-w-7xl mx-auto space-y-6">
        
        
        <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-6 bg-[#121214] p-6 md:px-8 md:py-6 rounded-2xl border border-gray-800/60 shadow-2xl shadow-black/50">
            <div>
                <h1 class="text-3xl font-extrabold flex items-center gap-3 tracking-tight">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-400">
                        Web Code Optimizer
                    </span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400">
                        <path d="m18 16 4-4-4-4"/>
                        <path d="m6 8-4 4 4 4"/>
                        <path d="m14.5 4-5 16"/>
                    </svg>
                </h1>
                <p class="text-sm text-gray-500 mt-2 font-medium tracking-wide">
                    コメント削除・空行削除・CSS/JSファイルの自動分離を一括処理
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-gray-400 hover:text-gray-200 bg-[#18181b] px-4 py-2.5 rounded-lg border border-gray-700/50 transition-colors">
                    <input type="checkbox" id="opt-remove-comments" checked class="w-4 h-4 text-indigo-500 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-offset-gray-900 accent-indigo-500" />
                    コメント削除
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-gray-400 hover:text-gray-200 bg-[#18181b] px-4 py-2.5 rounded-lg border border-gray-700/50 transition-colors">
                    <input type="checkbox" id="opt-remove-empty-lines" checked class="w-4 h-4 text-indigo-500 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-offset-gray-900 accent-indigo-500" />
                    空行を詰める
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-gray-400 hover:text-gray-200 bg-[#18181b] px-4 py-2.5 rounded-lg border border-gray-700/50 transition-colors">
                    <input type="checkbox" id="opt-separate-files" checked class="w-4 h-4 text-indigo-500 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-offset-gray-900 accent-indigo-500" />
                    CSS/JS分離
                </label>
                <button
                    id="btn-process"
                    disabled
                    class="flex items-center gap-2 px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 disabled:from-gray-700 disabled:to-gray-800 disabled:text-gray-500 text-white font-bold rounded-lg shadow-lg shadow-indigo-900/20 transition-all active:scale-95 border border-cyan-500/30 disabled:border-transparent ml-auto xl:ml-0"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                    </svg>
                    EXECUTE
                </button>
            </div>
        </header>

        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="flex flex-col bg-[#121214] rounded-2xl shadow-xl border border-gray-800/60 overflow-hidden">
                <div class="flex items-center justify-between px-5 py-3.5 bg-[#18181b] border-b border-gray-800">
                    <span class="font-bold text-gray-300 text-sm tracking-wider">INPUT SOURCE</span>
                    <div class="flex gap-3">
                        <button id="btn-sample" class="text-xs px-3 py-1.5 text-gray-400 hover:text-cyan-400 hover:bg-cyan-950/30 rounded-md transition-colors border border-transparent hover:border-cyan-900/50 font-medium">
                            Load Sample
                        </button>
                        <button id="btn-clear" class="text-xs px-3 py-1.5 text-gray-400 hover:text-rose-400 hover:bg-rose-950/30 rounded-md transition-colors flex items-center gap-1.5 border border-transparent hover:border-rose-900/50 font-medium">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18" />
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                            </svg>
                            Clear
                        </button>
                    </div>
                </div>
                <textarea
                    id="input-code"
                    placeholder="ここにターゲットとなるコードをペースト..."
                    class="w-full h-[55vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none focus:ring-1 focus:ring-indigo-500/50 bg-[#0a0a0c] text-gray-300 placeholder-gray-700"
                    spellcheck="false"
                ></textarea>
            </div>

            
            <div class="flex flex-col bg-[#121214] rounded-2xl shadow-xl border border-gray-800/60 overflow-hidden relative">
                <div class="flex items-center justify-between px-5 py-3.5 bg-[#18181b] border-b border-gray-800">
                    <span class="font-bold text-gray-300 text-sm tracking-wider">MAIN OUTPUT (HTML)</span>
                    <button
                        id="btn-copy-main"
                        disabled
                        class="flex items-center gap-2 text-xs px-4 py-1.5 bg-[#27272a] hover:bg-[#3f3f46] disabled:opacity-50 text-gray-200 rounded-md transition-colors border border-gray-700/50 font-medium"
                        onclick="handleCopy('output-code', this)"
                    >
                        <span class="copy-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>
                        </span>
                        <span class="copy-text">Copy Code</span>
                    </button>
                </div>
                <textarea
                    id="output-code"
                    readonly
                    placeholder="処理されたメインのコードがここに生成されます"
                    class="w-full h-[55vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none bg-[#0a0a0c] text-emerald-400 placeholder-gray-700"
                    spellcheck="false"
                ></textarea>
            </div>
        </div>

        
        <div id="separated-files-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6 empty:hidden mt-6">
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputCode = document.getElementById('input-code');
            const outputCode = document.getElementById('output-code');
            
            const optRemoveComments = document.getElementById('opt-remove-comments');
            const optRemoveEmptyLines = document.getElementById('opt-remove-empty-lines');
            const optSeparateFiles = document.getElementById('opt-separate-files');
            
            const btnProcess = document.getElementById('btn-process');
            const btnCopyMain = document.getElementById('btn-copy-main');
            const btnClear = document.getElementById('btn-clear');
            const btnSample = document.getElementById('btn-sample');
            const separatedFilesContainer = document.getElementById('separated-files-container');

            const sampleCodeText = `<!-- 
=========================================================
 Web Code Optimizer サンプルコード
========================================================= 
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sample App</title>
    
    <!-- メインのスタイル -->
    <style>
        body {
            background-color: #000; /* 背景色を設定 */
            color: #fff;
        }

        .bg-img {
            /* URL内のスラッシュは保護されます */
            background-image: url('https://example.com/bg.png'); // URL
        }
    </style>
</head>
<body>
    <div id="app">Hello World</div>

    <!-- アプリケーションスクリプト -->
    <script>
        // 初期化処理関数
        function initApp() {
            console.log("App initialized"); /* ログを出力 */
            const url = "https://example.com/api"; // APIエンドポイント
        }
        
        initApp();
    <\/script>
</body>
</html>`;

            const icons = {
                copy: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>`,
                check: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="M20 6 9 17l-5-5" /></svg>`
            };

            const updateButtonsState = () => {
                btnProcess.disabled = inputCode.value.trim() === '';
                btnCopyMain.disabled = outputCode.value === '';
            };

            inputCode.addEventListener('input', updateButtonsState);

            
            window.handleCopy = function(elementId, btnElement) {
                const textarea = document.getElementById(elementId);
                if (!textarea || !textarea.value) return;

                textarea.select();
                try {
                    document.execCommand('copy');
                    
                    const iconContainer = btnElement.querySelector('.copy-icon-container');
                    const textSpan = btnElement.querySelector('.copy-text');
                    
                    if (iconContainer && textSpan) {
                        iconContainer.innerHTML = icons.check;
                        textSpan.textContent = 'Copied!';
                        setTimeout(() => {
                            iconContainer.innerHTML = icons.copy;
                            textSpan.textContent = 'Copy Code';
                        }, 2000);
                    }
                } catch (err) {
                    console.error('コピーに失敗しました', err);
                }
                window.getSelection().removeAllRanges();
            };

            
            function escapeHtml(unsafe) {
                return unsafe
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }

            
            function createSeparatedFileBlock(fileName, content, idPrefix) {
                const id = `sep-${idPrefix}`;
                return `
                <div class="flex flex-col bg-[#121214] rounded-2xl shadow-xl border border-gray-800/60 overflow-hidden relative transition-all">
                    <div class="flex items-center justify-between px-5 py-3.5 bg-[#18181b] border-b border-gray-800">
                        <span class="font-bold text-gray-300 text-sm tracking-wider">${fileName}</span>
                        <button
                            onclick="handleCopy('${id}', this)"
                            class="flex items-center gap-2 text-xs px-4 py-1.5 bg-[#27272a] hover:bg-[#3f3f46] text-gray-200 rounded-md transition-colors border border-gray-700/50 font-medium"
                        >
                            <span class="copy-icon-container">${icons.copy}</span>
                            <span class="copy-text">Copy Code</span>
                        </button>
                    </div>
                    <textarea
                        id="${id}"
                        readonly
                        class="w-full h-[35vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none bg-[#0a0a0c] text-[#38bdf8] placeholder-gray-700"
                        spellcheck="false"
                    >${escapeHtml(content)}</textarea>
                </div>
                `;
            }

            
            btnProcess.addEventListener('click', () => {
                let text = inputCode.value;
                if (!text) return;

                try {
                    
                    if (optRemoveComments.checked) {
                        
                        const protectPattern = String.raw`(url\([^)]*\)|"(?:\\.|[^"\\\r\n])*"|'(?:\\.|[^'\\\r\n])*'|\`(?:\\.|[^\`\\])*\`)`;
                        
                        const htmlComment = String.raw`<!--[\s\S]*?-->`;
                        const blockComment = String.raw`/\*[\s\S]*?\*/`;
                        const lineComment = String.raw`/[/].*`;
                        
                        const removePattern = `(${htmlComment}|${blockComment}|${lineComment})`;
                        const regex = new RegExp(`${protectPattern}|${removePattern}`, 'g');
                        
                        text = text.replace(regex, (match, keepGroup, removeGroup) => {
                            if (keepGroup) return keepGroup; 
                            if (removeGroup) return '';      
                            return match;
                        });
                    }

                    
                    if (optRemoveEmptyLines.checked) {
                        
                        text = text.replace(/^[ \t　]*[\r\n]/gm, '');
                    }

                    
                    separatedFilesContainer.innerHTML = ''; 
                    
                    if (optSeparateFiles.checked) {
                        let cssCount = 1;
                        let jsCount = 1;
                        const cssFiles = [];
                        const jsFiles = [];

                        
                        text = text.replace(/<style([^>]*)>([\s\S]*?)<\/style>/gi, (match, attributes, content) => {
                            if (content.trim() === '') return match;
                            const fileName = `style${cssCount}.css`;
                            cssFiles.push({ name: fileName, content: content.trim() });
                            cssCount++;
                            return `<link rel="stylesheet" href="${fileName}">`;
                        });

                        
                        text = text.replace(/<script([^>]*)>([\s\S]*?)<\/script>/gi, (match, attributes, content) => {
                            
                            if (attributes.toLowerCase().includes('src=') || attributes.toLowerCase().includes('src =')) {
                                return match;
                            }
                            if (content.trim() === '') return match;
                            const fileName = `script${jsCount}.js`;
                            jsFiles.push({ name: fileName, content: content.trim() });
                            jsCount++;
                            return `<script src="${fileName}"><\/script>`;
                        });

                        
                        let blocksHtml = '';
                        cssFiles.forEach((file, index) => {
                            blocksHtml += createSeparatedFileBlock(file.name, file.content, `css-${index}`);
                        });
                        jsFiles.forEach((file, index) => {
                            blocksHtml += createSeparatedFileBlock(file.name, file.content, `js-${index}`);
                        });
                        
                        separatedFilesContainer.innerHTML = blocksHtml;
                    }

                    
                    outputCode.value = text;
                    updateButtonsState();

                } catch (error) {
                    console.error("処理中にエラーが発生しました:", error);
                    alert("コードの処理に失敗しました。コンソールをご確認ください。");
                }
            });

            
            btnClear.addEventListener('click', () => {
                if (window.confirm('入力内容とすべての出力結果をクリアしますか？')) {
                    inputCode.value = '';
                    outputCode.value = '';
                    separatedFilesContainer.innerHTML = '';
                    updateButtonsState();
                }
            });

            
            btnSample.addEventListener('click', () => {
                inputCode.value = sampleCodeText;
                updateButtonsState();
            });
        });
    </script>
</body>
</html>
