<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Optimizer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautifier.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-css.min.js"></script>
    <style>
        
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', YuGothic, Meiryo, sans-serif;
        }
        
        
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff; 
            border-left: 2px solid #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e5e5; 
            border: 2px solid #000;
            border-radius: 0; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cccccc; 
        }

        
        .btn-solid-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s ease;
        }
        .btn-solid-shadow:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
        .btn-solid-shadow:disabled {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-black p-4 md:p-8 selection:bg-black selection:text-white">
    <div class="max-w-7xl mx-auto space-y-8">
        
        
        <header class="flex flex-col xl:flex-row xl:items-center justify-between gap-6 bg-white p-6 md:px-8 border-2 border-black btn-solid-shadow">
            <div>
                <h1 class="text-3xl font-black flex items-center gap-3 tracking-tighter uppercase">
                    Web Code Optimizer
                </h1>
                <p class="text-sm text-gray-600 mt-2 font-bold tracking-widest uppercase">
                    コメント削除・空行削除・分離・フォーマットを一括処理
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                
                <label class="cursor-pointer inline-block">
                    <input type="checkbox" id="opt-remove-comments" checked class="peer sr-only" />
                    <div class="px-3 py-2 border-2 border-black bg-white text-black font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors select-none">
                        コメント削除
                    </div>
                </label>

                <label class="cursor-pointer inline-block">
                    <input type="checkbox" id="opt-remove-empty-lines" checked class="peer sr-only" />
                    <div class="px-3 py-2 border-2 border-black bg-white text-black font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors select-none">
                        空行を詰める
                    </div>
                </label>

                <label class="cursor-pointer inline-block">
                    <input type="checkbox" id="opt-separate-files" checked class="peer sr-only" />
                    <div class="px-3 py-2 border-2 border-black bg-white text-black font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors select-none">
                        CSS/JS分離
                    </div>
                </label>

                
                <label class="cursor-pointer inline-block">
                    <input type="checkbox" id="opt-format-code" checked class="peer sr-only" />
                    <div class="px-3 py-2 border-2 border-black bg-white text-black font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors select-none">
                        自動フォーマット
                    </div>
                </label>

                <button
                    id="btn-process"
                    disabled
                    class="ml-auto xl:ml-2 flex items-center gap-2 px-6 py-2 bg-white border-2 border-black font-black text-black hover:bg-black hover:text-white disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-400 disabled:cursor-not-allowed btn-solid-shadow"
                >
                    EXECUTE
                </button>
            </div>
        </header>

        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            
            <div class="flex flex-col bg-white border-2 border-black btn-solid-shadow relative">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-100 border-b-2 border-black">
                    <span class="font-black text-black text-sm tracking-widest uppercase">Input Source</span>
                    <div class="flex gap-2">
                        <button id="btn-sample" class="text-xs px-3 py-1 bg-white border-2 border-black font-bold hover:bg-black hover:text-white transition-colors">
                            Sample
                        </button>
                        <button id="btn-clear" class="text-xs px-3 py-1 bg-white border-2 border-black font-bold hover:bg-red-600 hover:text-white hover:border-red-600 transition-colors">
                            Clear
                        </button>
                    </div>
                </div>
                <textarea
                    id="input-code"
                    placeholder="ターゲットとなるコードをペーストしてください..."
                    class="w-full h-[55vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none focus:bg-gray-50 bg-white text-black placeholder-gray-400"
                    spellcheck="false"
                ></textarea>
            </div>

            
            <div class="flex flex-col bg-white border-2 border-black btn-solid-shadow relative">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-100 border-b-2 border-black">
                    <span class="font-black text-black text-sm tracking-widest uppercase">Main Output (HTML)</span>
                    <button
                        id="btn-copy-main"
                        disabled
                        class="flex items-center gap-1.5 text-xs px-3 py-1 bg-white border-2 border-black font-bold hover:bg-black hover:text-white disabled:opacity-50 disabled:hover:bg-white disabled:hover:text-black transition-colors"
                        onclick="handleCopy('output-code', this)"
                    >
                        <span class="copy-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><rect width="14" height="14" x="8" y="8"/><path d="M4 16c0 0 0 0 0 0V4c0 0 0 0 0 0h12"/></svg>
                        </span>
                        <span class="copy-text">COPY</span>
                    </button>
                </div>
                <textarea
                    id="output-code"
                    readonly
                    placeholder="処理されたメインのコードがここに生成されます"
                    class="w-full h-[55vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none bg-white text-black placeholder-gray-400"
                    spellcheck="false"
                ></textarea>
            </div>
        </div>

        
        <div id="separated-files-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8 empty:hidden mt-8">
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputCode = document.getElementById('input-code');
            const outputCode = document.getElementById('output-code');
            
            const optRemoveComments = document.getElementById('opt-remove-comments');
            const optRemoveEmptyLines = document.getElementById('opt-remove-empty-lines');
            const optSeparateFiles = document.getElementById('opt-separate-files');
            const optFormatCode = document.getElementById('opt-format-code'); 
            
            const btnProcess = document.getElementById('btn-process');
            const btnCopyMain = document.getElementById('btn-copy-main');
            const btnClear = document.getElementById('btn-clear');
            const btnSample = document.getElementById('btn-sample');
            const separatedFilesContainer = document.getElementById('separated-files-container');

            const sampleCodeText = `<!-- 
=========================================================
 Web Code Optimizer サンプルコード
========================================================= 
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sample App</title>
    
    <!-- メインのスタイル（属性が保持されるかテスト） -->
    <style type="text/css" media="screen">
body {
    background-color: #fff; /* 背景色を設定 */
        color: #000;
}

        .bg-img {
            /* URL内のスラッシュは保護されます */
            background-image: url('https://example.com/bg.png'); // URL
        }
    </style>
</head>
<body>
    <div id="app">Hello World</div>

    <!-- アプリケーションスクリプト（モジュール属性の保持テスト） -->
    <script type="module" defer>
import { example } from './module.js';

// 初期化処理関数
        function initApp() {
console.log("App initialized"); /* ログを出力 */
const url = "https://example.com/api"; // APIエンドポイント
        }
        
initApp();
    <\/script>
</body>
</html>`;

            const icons = {
                copy: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><rect width="14" height="14" x="8" y="8"/><path d="M4 16c0 0 0 0 0 0V4c0 0 0 0 0 0h12"/></svg>`,
                check: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" class="text-black"><path d="M20 6 9 17l-5-5" /></svg>`
            };

            const updateButtonsState = () => {
                btnProcess.disabled = inputCode.value.trim() === '';
                btnCopyMain.disabled = outputCode.value === '';
            };

            inputCode.addEventListener('input', updateButtonsState);

            
            window.handleCopy = function(elementId, btnElement) {
                const textarea = document.getElementById(elementId);
                if (!textarea || !textarea.value) return;

                textarea.select();
                try {
                    document.execCommand('copy');
                    
                    const iconContainer = btnElement.querySelector('.copy-icon-container');
                    const textSpan = btnElement.querySelector('.copy-text');
                    const originalClass = btnElement.className;
                    
                    if (iconContainer && textSpan) {
                        iconContainer.innerHTML = icons.check;
                        textSpan.textContent = 'COPIED';
                        
                        
                        btnElement.classList.add('bg-black', 'text-white');
                        const svgPath = iconContainer.querySelector('svg');
                        if(svgPath) svgPath.classList.replace('text-black', 'text-white');

                        setTimeout(() => {
                            iconContainer.innerHTML = icons.copy;
                            textSpan.textContent = 'COPY';
                            btnElement.className = originalClass;
                        }, 2000);
                    }
                } catch (err) {
                    console.error('コピーに失敗しました', err);
                }
                window.getSelection().removeAllRanges();
            };

            
            function escapeHtml(unsafe) {
                return unsafe
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }

            
            function createSeparatedFileBlock(fileName, content, idPrefix) {
                const id = `sep-${idPrefix}`;
                return `
                <div class="flex flex-col bg-white border-2 border-black btn-solid-shadow relative transition-all">
                    <div class="flex items-center justify-between px-4 py-3 bg-gray-100 border-b-2 border-black">
                        <span class="font-black text-black text-sm tracking-widest uppercase">${fileName}</span>
                        <button
                            onclick="handleCopy('${id}', this)"
                            class="flex items-center gap-1.5 text-xs px-3 py-1 bg-white border-2 border-black font-bold hover:bg-black hover:text-white transition-colors"
                        >
                            <span class="copy-icon-container">${icons.copy}</span>
                            <span class="copy-text">COPY</span>
                        </button>
                    </div>
                    <textarea
                        id="${id}"
                        readonly
                        class="w-full h-[35vh] p-5 font-mono text-sm leading-relaxed resize-none focus:outline-none bg-white text-black placeholder-gray-400"
                        spellcheck="false"
                    >${escapeHtml(content)}</textarea>
                </div>
                `;
            }

            
            btnProcess.addEventListener('click', () => {
                let text = inputCode.value;
                if (!text) return;

                try {
                    
                    if (optRemoveComments.checked) {
                        const protectPattern = String.raw`(url\([^)]*\)|"(?:\\.|[^"\\\r\n])*"|'(?:\\.|[^'\\\r\n])*'|\`(?:\\.|[^\`\\])*\`)`;
                        const htmlComment = String.raw`<!--[\s\S]*?-->`;
                        const blockComment = String.raw`/\*[\s\S]*?\*/`;
                        const lineComment = String.raw`/[/].*`;
                        
                        const removePattern = `(${htmlComment}|${blockComment}|${lineComment})`;
                        const regex = new RegExp(`${protectPattern}|${removePattern}`, 'g');
                        
                        text = text.replace(regex, (match, keepGroup, removeGroup) => {
                            if (keepGroup) return keepGroup; 
                            if (removeGroup) return '';      
                            return match;
                        });
                    }

                    
                    if (optRemoveEmptyLines.checked) {
                        text = text.replace(/^[ \t　]*[\r\n]/gm, '');
                    }

                    separatedFilesContainer.innerHTML = ''; 
                    
                    
                    if (optSeparateFiles.checked) {
                        let cssCount = 1;
                        let jsCount = 1;
                        const cssFiles = [];
                        const jsFiles = [];

                        
                        text = text.replace(/<style([^>]*)>([\s\S]*?)<\/style>/gi, (match, attributes, content) => {
                            if (content.trim() === '') return match;
                            const fileName = `style${cssCount}.css`;
                            let fileContent = content.trim();

                            
                            if (optFormatCode.checked && typeof css_beautify !== 'undefined') {
                                fileContent = css_beautify(fileContent, { 
                                    indent_size: 4, 
                                    max_preserve_newlines: optRemoveEmptyLines.checked ? 0 : 2 
                                });
                            }

                            cssFiles.push({ name: fileName, content: fileContent });
                            cssCount++;
                            
                            return `<link rel="stylesheet" href="${fileName}"${attributes}>`;
                        });

                        
                        text = text.replace(/<script([^>]*)>([\s\S]*?)<\/script>/gi, (match, attributes, content) => {
                            
                            if (attributes.toLowerCase().includes('src=') || attributes.toLowerCase().includes('src =')) {
                                return match;
                            }
                            if (content.trim() === '') return match;
                            const fileName = `script${jsCount}.js`;
                            let fileContent = content.trim();

                            
                            if (optFormatCode.checked && typeof js_beautify !== 'undefined') {
                                fileContent = js_beautify(fileContent, { 
                                    indent_size: 4, 
                                    max_preserve_newlines: optRemoveEmptyLines.checked ? 0 : 2 
                                });
                            }

                            jsFiles.push({ name: fileName, content: fileContent });
                            jsCount++;
                            
                            return `<script${attributes} src="${fileName}"><\/script>`;
                        });

                        
                        let blocksHtml = '';
                        cssFiles.forEach((file, index) => {
                            blocksHtml += createSeparatedFileBlock(file.name, file.content, `css-${index}`);
                        });
                        jsFiles.forEach((file, index) => {
                            blocksHtml += createSeparatedFileBlock(file.name, file.content, `js-${index}`);
                        });
                        separatedFilesContainer.innerHTML = blocksHtml;
                    }

                    
                    if (optFormatCode.checked && typeof html_beautify !== 'undefined') {
                        text = html_beautify(text, {
                            indent_size: 4,
                            max_preserve_newlines: optRemoveEmptyLines.checked ? 0 : 2, 
                            preserve_newlines: !optRemoveEmptyLines.checked,
                            wrap_line_length: 0,
                            indent_inner_html: true
                        });
                    }

                    
                    outputCode.value = text;
                    updateButtonsState();

                } catch (error) {
                    console.error("処理中にエラーが発生しました:", error);
                    alert("コードの処理に失敗しました。コンソールをご確認ください。");
                }
            });

            
            btnClear.addEventListener('click', () => {
                if (window.confirm('入力内容とすべての出力結果をクリアしますか？')) {
                    inputCode.value = '';
                    outputCode.value = '';
                    separatedFilesContainer.innerHTML = '';
                    updateButtonsState();
                }
            });

            
            btnSample.addEventListener('click', () => {
                inputCode.value = sampleCodeText;
                updateButtonsState();
            });
        });
    </script>
</body>
</html>
